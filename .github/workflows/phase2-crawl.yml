name: phase2-crawl
on:
  pull_request:
    paths:
      - 'phase2_wikipedia_crawl.py'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install crawl dependencies
        run: python -m pip install --quiet mwparserfromhell
      - name: Crawl folklore fairy-tale legend sampling frame
        run: python phase2_wikipedia_crawl.py
      - name: Upload folklore crawl
        uses: actions/upload-artifact@v4
        with:
          name: phase2-folklore-fairy-legends
          path: phase2_folklore_fairy_legends.json
          retention-days: 1
