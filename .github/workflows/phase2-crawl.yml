name: phase2-crawl
on:
  pull_request:
    paths:
      - 'phase2_wikipedia_crawl.py'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install crawl dependencies
        run: python -m pip install --quiet mwparserfromhell pandas lxml html5lib beautifulsoup4
      - name: Crawl science-fiction short-fiction frame
        run: python phase2_wikipedia_crawl.py
      - name: Upload short-fiction crawl
        uses: actions/upload-artifact@v4
        with:
          name: phase2-sf-short-fiction
          path: phase2_sf_short_fiction.json
          retention-days: 1
