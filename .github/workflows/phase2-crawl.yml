name: phase2-crawl
on:
  push:
    paths:
      - '.github/workflows/phase2-crawl.yml'
      - 'phase2_wikipedia_crawl.py'
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Crawl Wikimedia category frame
        run: python phase2_wikipedia_crawl.py
      - name: Commit crawl dataset
        run: |
          git config user.name "phase2-crawl-bot"
          git config user.email "cwmccabe.ai@gmail.com"
          git add phase2_sf_novels.json
          git commit -m "Temporary Phase II crawl dataset" || exit 0
          git push
